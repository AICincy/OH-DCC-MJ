name: test

on:
  pull_request:
    paths:
      - "ohcanna/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest
