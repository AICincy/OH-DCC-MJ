name: scrape-daily

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Scrape
        run: python -m ohcanna scrape --source bloom
      - name: Commit snapshots
        run: |
          git config user.name "ohcanna-bot"
          git config user.email "ohcanna-bot@aicincy.org"
          git add data/snapshots/ data/latest/
          if ! git diff --staged --quiet; then
            git commit -m "snapshot: $(date -u +%F)"
            git push
          else
            echo "no changes to commit"
          fi
